apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-frontend
  namespace: chatbot

spec:
  replicas: 1

  selector:
    matchLabels:
      app: chatbot-frontend

  template:
    metadata:
      labels:
        app: chatbot-frontend

    spec:

      containers:

      - name: frontend

        image: rahulloganathan/chatbot-frontend:78c887a3d4bf2b86a9e713a77fa74f500187718b

        imagePullPolicy: Always

        ports:
        - containerPort: 8501

        # env:
        # - name: BACKEND_URL
        #   value: "http://chatbot-backend:8000/chat"

        resources:

          requests:
            cpu: "200m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
