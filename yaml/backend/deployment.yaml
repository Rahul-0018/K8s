apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-backend
  namespace: chatbot
spec:
  replicas: 1

  selector:
    matchLabels:
      app: chatbot-backend

  template:
    metadata:
      labels:
        app: chatbot-backend

    spec:
      containers:

      - name: backend

        image: rahulloganathan/chatbot-backend:331bf9371810d418840380633b6f3e1a421404a1

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: groq-secret
              key: GROQ_API_KEY

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
