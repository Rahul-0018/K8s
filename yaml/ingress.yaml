apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-ingress
  namespace: chatbot
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chatbot-frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: chatbot-backend
            port:
              number: 8000
